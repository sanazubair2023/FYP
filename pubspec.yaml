name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  image_picker: ^0.8.6
  http: ^1.1.0
  shared_preferences: ^2.2.2       # 🔥 User data (Token, Name) save karne ke liye
  cached_network_image: ^3.3.0    # 🔥 Profile pictures load karne ke liye
  material_design_icons_flutter: ^7.0.7296
  font_awesome_flutter: ^10.7.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/logo1.png
    - assets/images/logo2.png
    - assets/images/logo3.png